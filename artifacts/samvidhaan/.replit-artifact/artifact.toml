kind = "web"
previewPath = "/"
title = "Samvidhaan+"
version = "1.0.0"
id = "artifacts/samvidhaan"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18918

[services.development]
run = "pnpm --filter @workspace/samvidhaan run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/samvidhaan", "run", "build" ]
publicDir = "artifacts/samvidhaan/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18918"
BASE_PATH = "/"
